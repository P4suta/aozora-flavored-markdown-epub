name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  commitlint:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: taiki-e/install-action@v2
        with:
          tool: committed
      - name: Check Conventional Commits (committed)
        run: committed "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: docker compose build
        run: docker compose build dev
      - name: fmt
        run: docker compose run --rm dev cargo fmt --all -- --check
      - name: clippy
        run: docker compose run --rm dev cargo clippy --workspace --all-targets -- -D warnings
      - name: test
        run: docker compose run --rm dev cargo nextest run --workspace
      # NOTE: coverage gate, example build (aozora-flavored-markdown-epub-cli),
      # and the epubcheck step are intentionally deferred until the EPUB
      # writer phases (compose/package) are no longer stubs.
      # aozora-flavored-markdown-epub is in pre-alpha scaffolding; reinstate
      # them as the implementation lands.

  typos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: crate-ci/typos@master

  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build dev
      - run: docker compose run --rm dev cargo deny check
