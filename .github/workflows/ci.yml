name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: docker compose build
        run: docker compose build dev
      - name: fmt
        run: docker compose run --rm dev cargo fmt --all -- --check
      - name: clippy
        run: docker compose run --rm dev cargo clippy --workspace --all-targets -- -D warnings
      - name: test
        run: docker compose run --rm dev cargo nextest run --workspace
      # NOTE: coverage gate, example build (afm-epub-cli), and the
      # epubcheck step are intentionally deferred until the EPUB
      # writer phases (compose/package) are no longer stubs. afm-epub
      # is in pre-alpha scaffolding; reinstate them as the
      # implementation lands.

  typos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: crate-ci/typos@master

  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build dev
      - run: docker compose run --rm dev cargo deny check
