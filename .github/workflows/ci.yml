name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  commitlint:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: taiki-e/install-action@v2
        with:
          tool: committed
      - name: Check Conventional Commits (committed)
        run: committed "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: docker compose build
        run: docker compose build dev
      - name: fmt
        run: docker compose run --rm dev cargo fmt --all -- --check
      - name: clippy
        run: docker compose run --rm dev cargo clippy --workspace --all-targets -- -D warnings
      - name: test
        run: docker compose run --rm dev cargo nextest run --workspace
      - name: coverage
        run: docker compose run --rm dev cargo llvm-cov --workspace --fail-under-lines 88
      - name: example build
        run: docker compose run --rm dev cargo run --release -p aozora-flavored-markdown-epub-cli -- build --input examples/sample/manuscript --metadata examples/sample/book.toml --output out/sample.epub
      - name: epubcheck
        run: docker compose run --rm dev epubcheck --failonwarnings out/sample.epub

  typos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: crate-ci/typos@master

  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build dev
      - run: docker compose run --rm dev cargo deny check
