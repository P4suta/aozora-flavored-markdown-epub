# Rust toolchain + cargo-built dev tools for host iteration on aozora-flavored-markdown-epub.
# mise merges this with mise.toml (same directory, tool-level union).
#
# aozora-flavored-markdown-epub's canonical build/test environment is the Docker image
# (ADR-0002); this manifest lets contributors run the fast inner loop on
# the host via mise, while `just ci` in the container stays the
# authoritative merge gate. The rust version mirrors rust-toolchain.toml.
[tools]
rust = "1.96.0"
"cargo:cargo-nextest" = "latest"
"cargo:cargo-deny" = "latest"
"cargo:cargo-llvm-cov" = "latest"
