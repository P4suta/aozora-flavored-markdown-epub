# mise (https://mise.jdx.dev/) — declarative source of dev-tool versions
# for afm-epub. Run `mise install` for the host inner loop.
#
# afm-epub is Docker-first (ADR-0002): the container is the canonical,
# locale-pinned build/test environment and `just ci` there is the merge
# gate. This manifest is for the fast host inner loop and for the
# commit-msg hook. Rust + cargo plugins live in .config/mise/config.toml.
[tools]
just = "latest"
lefthook = "latest"
"github:crate-ci/typos" = "latest"
"github:crate-ci/committed" = "latest"
actionlint = "latest"
