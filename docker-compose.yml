# Docker-only execution surface (ADR-0002). Every cargo / nextest /
# clippy / llvm-cov / epubcheck invocation flows through here via
# Justfile targets. Host toolchain invocations are forbidden.

services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    image: aozora-flavored-markdown-epub-dev
    init: true
    working_dir: /workspace
    volumes:
      - .:/workspace:cached
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - target:/workspace/target
      - sccache:/sccache
    environment:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE:   "1"
      RUSTC_WRAPPER:    /usr/local/cargo/bin/sccache
      SCCACHE_DIR:      /sccache
    tty: true

volumes:
  cargo-registry:
  cargo-git:
  target:
  sccache:
