# cargo-deny configuration.
# Strategy mirrors afm/aozora: refuse the known-problem dependency
# graphs (advisories, license incompat, multiple major versions of the
# same crate) and treat the lockfile as authoritative.

[graph]
all-features = true

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked  = "deny"
ignore  = []

[licenses]
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "MIT",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "MPL-2.0",
  "Zlib",
  "CC0-1.0",
]
confidence-threshold = 0.93

[bans]
multiple-versions = "warn"
wildcards         = "deny"
deny              = []

[sources]
unknown-registry = "deny"
unknown-git      = "deny"
allow-git        = [
  "https://github.com/P4suta/afm",
  "https://github.com/P4suta/aozora",
]
